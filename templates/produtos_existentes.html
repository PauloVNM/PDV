<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mercado - Homologação EAN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='produtos.css') }}">
</head>
<body>

    <header>
        <h1>CADASTRO DE PRODUTOS EXISTENTES</h1>
    </header>

    <main>
        <form id="form-cadastro" action="/salvar_produto_existente" method="POST">
            
            <section aria-label="Identidade do Produto" class="form-cadastro grid-identidade">
                <div class="campo-grupo">
                    <label for="codigo_ean">Código de Barras (EAN)</label>
                    <input type="text" name="codigo" id="codigo_ean" autofocus required>
                    <div id="status_ean" class="status-label"></div>
                </div>

                <div class="campo-grupo">
                    <label for="nome_produto">Descrição do Produto</label>
                    <input type="text" name="nome" id="nome_produto" required>
                </div>

                <div class="campo-grupo">
                    <label for="marca_produto">Marca</label>
                    <input type="text" name="marca" id="marca_produto" required>
                </div>
            </section>

            <section aria-label="Cálculo de Preço" class="form-cadastro grid-preco">
                <div class="campo-grupo">
                    <label for="margem_lucro">Margem (%)</label>
                    <input type="number" id="margem_lucro" class="input-margem" placeholder="Ex: 30">
                </div>

                <div class="campo-grupo">
                    <label for="custo_reais">Custo (R$)</label>
                    <input type="number" id="custo_reais" placeholder="0">
                </div>
                <div class="campo-grupo">
                    <label for="custo_cents">Custo (Centavos)</label>
                    <input type="number" id="custo_cents" placeholder="00" max="99">
                </div>

                <div class="campo-grupo">
                    <label for="venda_reais" class="destaque-venda">Venda (R$)</label>
                    <input type="number" id="venda_reais" placeholder="0" required>
                </div>
                <div class="campo-grupo">
                    <label for="venda_cents" class="destaque-venda">Venda (Cents)</label>
                    <input type="number" id="venda_cents" placeholder="00" max="99" required>
                </div>

                <input type="hidden" name="preco" id="preco_final_oculto">

                <button type="submit" class="btn-salvar">SALVAR</button>
            </section>
        </form>

        <section class="secao-lista" aria-label="Lista de Produtos Cadastrados">
            <h3>Últimos Itens Homologados</h3>
            
            <div class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>EAN</th>
                            <th>Descrição</th>
                            <th>Marca</th>
                            <th>Preço Final</th>
                        </tr>
                    </thead>
                    <tbody id="lista-produtos">
                        {% for produto in produtos %}
                        <tr>
                            <td>{{ produto['ean'] }}</td>
                            <td>{{ produto['nome'] }}</td>
                            <td>{{ produto['marca'] }}</td>
                            <td>R$ {{ "%.2f"|format(produto['preco']) }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

        </section>
    </main>

    <footer>
        <div>ESC para sair do módulo</div>
        <div>Módulo de Homologação Offline</div>
    </footer>

    <script src="{{ url_for('static', filename='js/api_produtos.js') }}"></script>
    <script src="{{ url_for('static', filename='js/precificacao.js') }}"></script>
    <script src="{{ url_for('static', filename='js/produtos_ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navegacao.js') }}"></script>

</body>
</html>
